name: Monthly Market Weather Report

on:
  schedule:
    - cron: "0 7 1 * *"   # 07:00 UTC on the 1st of every month
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages (cached between runs)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::quantmod
            any::TTR
            any::xts
            any::zoo
            any::plotly
            any::DT
            any::forecast
            any::rvest
            any::httr
            any::jsonlite
            any::dplyr
            any::tidyr
            any::htmltools
            any::tibble
            any::knitr
            any::rmarkdown

      - name: Render the report (strict data mode; auto-retry after 5 min)
        env:
          STRICT_DATA: "true"
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}   # optional; empty is fine
        run: |
          quarto render market-weather-report.qmd || {
            echo "First attempt failed (likely a transient data-source outage) — retrying in 5 minutes…"
            sleep 300
            quarto render market-weather-report.qmd
          }

      - name: Assemble the site
        run: |
          mkdir -p _site
          cp market-weather-report.html _site/index.html
          cp market-weather-report.html "_site/market-weather-$(date +%Y-%m).html"

      - name: Upload site for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Keep a dated backup (workflow artifact, 90 days)
        uses: actions/upload-artifact@v4
        with:
          name: market-weather-report
          path: _site/market-weather-*.html

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
